# Versión: 0.1.0

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gesco
      POSTGRES_PASSWORD: gesco123
      POSTGRES_DB: gesco_v2
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gesco"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://gesco:gesco123@db:5432/gesco_v2
      CORS_ORIGINS: "http://localhost:3000,https://contratos.esenorte3.lat,https://www.contratos.esenorte3.lat"
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: https://contratos.esenorte3.lat
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
