# =============================================================================
# GESCO V2 — docker-compose for Coolify / production
# =============================================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gesco_v2}
      POSTGRES_USER: ${POSTGRES_USER:-gesco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gesco123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-gesco} -d $${POSTGRES_DB:-gesco_v2}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-gesco}:${POSTGRES_PASSWORD:-gesco123}@db:5432/${POSTGRES_DB:-gesco_v2}"
      CORS_ORIGINS: "https://contratos.esenorte3.lat,https://www.contratos.esenorte3.lat"
      DEBUG: "false"
    volumes:
      - uploads:/app/uploads
      - evidencias:/app/static/evidencias

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "9000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gesco-http.entrypoints=http"
      - "traefik.http.routers.gesco-http.rule=Host(`contratos.esenorte3.lat`)"
      - "traefik.http.routers.gesco-http.middlewares=redirect-to-https"
      - "traefik.http.routers.gesco.entrypoints=https"
      - "traefik.http.routers.gesco.rule=Host(`contratos.esenorte3.lat`)"
      - "traefik.http.routers.gesco.tls.certresolver=letsencrypt"
      - "traefik.http.services.gesco.loadbalancer.server.port=3000"
    environment:
      NEXT_PUBLIC_API_URL: "https://contratos.esenorte3.lat"

volumes:
  pgdata:
  uploads:
  evidencias:
